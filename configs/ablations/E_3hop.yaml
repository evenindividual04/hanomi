# Ablation E: 3-Hop Expansion
# Tests the effect of larger receptive field (3-hop neighbors)

feature_types: [through_hole, blind_hole]

epochs: 50
batch_size: 32
lr: 1.0e-3
weight_decay: 1.0e-5
scheduler: cosine
warmup_epochs: 5
grad_clip: 1.0

encoder:
  node_in_dim: 8
  edge_in_dim: 3
  hidden_dim: 128
  out_dim: 64
  num_layers: 4  # Increased to 4 layers for 3-hop receptive field
  dropout: 0.1

seg_head:
  in_dim: 64
  num_classes: 25

pooling:
  dim: 64
  mode: attention

loss:
  seg_weight: 1.0
  contrastive_weight: 0.5
  temperature: 0.07

data:
  h5_dir: MFCAD++_dataset/hierarchical_graphs
  seed: 42
  num_workers: 4

inference:
  tau_seed: 0.6
  tau_expand: 0.4
  tau_confidence: 0.5
  nms_iou_threshold: 0.5
  k_hop: 3  # 3-hop expansion instead of 2

evaluation:
  iou_threshold: 0.5
  compute_calibration: true

# Expected result: Slightly lower F1 (~0.82 vs 0.84) or similar
# Rationale: 3-hop may include irrelevant faces, adding noise
# Trade-off: Larger receptive field captures more context but may over-smooth
