# Phase 2: add rectangular_pocket to demonstrate extensibility.
# Fine-tune from Phase 1 checkpoint.

feature_types:
  - through_hole        # label 1
  - blind_hole          # label 12
  - rectangular_pocket  # label 14  ← new type

epochs: 30              # fewer epochs; fine-tuning from checkpoint
batch_size: 32
lr: 3.0e-4             # lower LR for fine-tuning
weight_decay: 1.0e-5
scheduler: cosine
warmup_epochs: 2
grad_clip: 1.0

encoder:
  node_in_dim: 8
  edge_in_dim: 3
  hidden_dim: 128
  out_dim: 64
  num_layers: 3
  dropout: 0.1

seg_head:
  in_dim: 64
  num_classes: 25

pooling:
  dim: 64
  mode: attention

loss:
  seg_weight: 1.0
  contrastive_weight: 0.5
  temperature: 0.07

data:
  h5_dir: MFCAD++_dataset/hierarchical_graphs
  seed: 42
  num_workers: 4

inference:
  tau_seed: 0.6
  tau_expand: 0.4
  tau_confidence: 0.5
  nms_iou_threshold: 0.5
