batch_size: 32
data:
  h5_dir: /kaggle/input/datasets/anmolsen24/mfcad-plus-plus
  num_workers: 4
  seed: 42
  zero_edge_features: true
encoder:
  dropout: 0.1
  edge_in_dim: 3
  hidden_dim: 128
  node_in_dim: 8
  num_layers: 3
  out_dim: 64
epochs: 50
evaluation:
  compute_calibration: true
  iou_threshold: 0.5
feature_types:
- through_hole
- blind_hole
grad_clip: 1.0
inference:
  k_hop: 2
  nms_iou_threshold: 0.5
  tau_confidence: 0.5
  tau_expand: 0.4
  tau_seed: 0.6
loss:
  contrastive_weight: 0.5
  seg_weight: 1.0
  temperature: 0.07
lr: 0.001
pooling:
  dim: 64
  mode: attention
scheduler: cosine
seg_head:
  in_dim: 64
  num_classes: 25
warmup_epochs: 5
weight_decay: 1.0e-05
